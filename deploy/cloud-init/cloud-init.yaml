#cloud-config
# ---------------------------------------------------------------------------
# Generic d-ui unattended install via cloud-init user-data.
#
# Works on any cloud-init platform: Hetzner, AWS, DigitalOcean, Vultr, GCP,
# Azure, Oracle. Paste the whole file as the instance "user data".
#
# It installs the latest d-ui release NON-INTERACTIVELY, generating unique
# random credentials per instance. Full credentials are surfaced ONLY on the
# serial console (owner-only); /etc/motd (world-readable) shows just the access
# URL + username. Nothing is baked in advance — every instance is unique.
#
# Requires the non-interactive install.sh (d-ui with DUI_NONINTERACTIVE support).
# Edit the exported DUI_* knobs in /opt/dui-bootstrap.sh below to customise.
# ---------------------------------------------------------------------------

package_update: true
package_upgrade: false

write_files:
  - path: /opt/dui-bootstrap.sh
    permissions: '0700'
    owner: root:root
    content: |
      #!/usr/bin/env bash
      set -euo pipefail
      export DEBIAN_FRONTEND=noninteractive

      # --- Non-interactive install knobs --------------------------------------
      export DUI_NONINTERACTIVE=1
      # SSL mode: none (plain HTTP, default) | ip | domain
      export DUI_SSL_MODE="${DUI_SSL_MODE:-none}"
      # Pin credentials instead of random (leave unset for secure random values):
      #   export DUI_USERNAME="admin2"
      #   export DUI_PASSWORD="change-me-please"
      #   export DUI_PANEL_PORT="2053"
      #   export DUI_WEB_BASE_PATH="panel"
      # Let's Encrypt domain certificate instead of plain HTTP:
      #   export DUI_SSL_MODE="domain"
      #   export DUI_DOMAIN="panel.example.com"
      #   export DUI_ACME_EMAIL="you@example.com"
      # PostgreSQL instead of SQLite:
      #   export DUI_DB_TYPE="postgres"
      #   export DUI_DB_DSN="postgres://user:pass@host:5432/db?sslmode=disable"
      # ------------------------------------------------------------------------

      curl -fsSL https://raw.githubusercontent.com/mdaltoon10/D-UI/main/install.sh | bash

      # Surface the generated credentials. Full creds (incl. password + API token)
      # go ONLY to the serial console (/dev/console, owner-only). /etc/motd is
      # world-readable, so it gets just the access URL + username and a pointer
      # to the root-only env file.
      if [ -r /etc/d-ui/install-result.env ]; then
        {
          echo
          echo "=== d-ui panel credentials (generated on first boot) ==="
          cat /etc/d-ui/install-result.env
          echo "========================================================"
          echo "Change the password after first login."
        } > /dev/console 2>/dev/null || true

        # shellcheck disable=SC1091
        . /etc/d-ui/install-result.env
        {
          echo
          echo "=== d-ui panel (generated on first boot) ==="
          echo "URL:      ${DUI_ACCESS_URL:-unknown}"
          echo "Username: ${DUI_USERNAME:-unknown}"
          echo "Password + API token: sudo cat /etc/d-ui/install-result.env"
          echo "============================================="
          echo "Change the password after first login."
        } >> /etc/motd 2>/dev/null || true
      fi

runcmd:
  - [bash, /opt/dui-bootstrap.sh]

final_message: "d-ui installed — full credentials in /etc/d-ui/install-result.env (sudo); /etc/motd shows the URL + username only."
